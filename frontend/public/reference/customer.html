      }
      if (!response.ok) throw new Error(data?.error || `请求失败：${response.status}`);
      return data;
    }

    function buildQuery(params) {
      const query = new URLSearchParams();
      Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== '') query.set(key, value);
      });
      const raw = query.toString();
      return raw ? `?${raw}` : '';
    }

    function fixedCoord(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number.toFixed(6) : '';
    }

    function currentLocationQuery() {
      return state.userLocation ? { lat: fixedCoord(state.userLocation.lat), lng: fixedCoord(state.userLocation.lng) } : {};
    }

    function buildStallQueryParams(locationQuery = currentLocationQuery()) {
      const params = { ...locationQuery, limit: 80 };
      if (state.mapBounds) {
        params.min_lat = fixedCoord(state.mapBounds.minLat);
        params.max_lat = fixedCoord(state.mapBounds.maxLat);
        params.min_lng = fixedCoord(state.mapBounds.minLng);
        params.max_lng = fixedCoord(state.mapBounds.maxLng);
      }
      if (state.mapZoom !== null && state.mapZoom !== undefined && Number.isFinite(Number(state.mapZoom))) params.zoom = Number(state.mapZoom).toFixed(2);
      const query = state.query.trim();
      if (query) params.q = query;
      if (hasTextSearch()) params.include_recent = 1;
      const categories = selectedCategoryList();
      if (categories.length) params.category = categories.join(',');
      return params;
    }

    function stableMapQueryKey(params) {
      return JSON.stringify(Object.keys(params).sort().map((key) => [key, String(params[key])]));
    }

    function formatClock(value) {
      if (!value) return '—';
      return new Date(value).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function formatShortDateTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function metersText(value) {
      if (value === null || value === undefined) return '定位后显示';
      const meters = Number(value);
      if (!Number.isFinite(meters)) return '定位后显示';
      return meters >= 1000 ? `${(meters / 1000).toFixed(1)} 公里` : `${Math.round(meters)} 米`;
    }

    function projectToStage(lat, lng, index, allItems) {
      const valid = allItems
        .map((item) => item.stall_session)
        .filter((session) => session && Number.isFinite(Number(session.lat)) && Number.isFinite(Number(session.lng)));
      const baseLat = state.userLocation?.lat || (valid.reduce((sum, item) => sum + Number(item.lat), 0) / Math.max(valid.length, 1)) || 22.3193;
      const baseLng = state.userLocation?.lng || (valid.reduce((sum, item) => sum + Number(item.lng), 0) / Math.max(valid.length, 1)) || 114.1694;
      if (!Number.isFinite(Number(lat)) || !Number.isFinite(Number(lng))) {
        return { x: 46 + (index % 3) * 11, y: 42 + Math.floor(index / 3) * 10 };
      }
      const x = Math.min(88, Math.max(12, 50 + (Number(lng) - baseLng) * 9000));
      const y = Math.min(82, Math.max(16, 50 - (Number(lat) - baseLat) * 9000));
      return { x: Math.round(x), y: Math.round(y) };
    }

    function normalizeCategory(category) {
      return category || '其他摊位';
    }

    function mapProduct(product) {
      return {
        id: String(product.id),
        backendId: product.id,
        name: product.name || '今日餐品',
        price: Number(((product.price_cents || 0) / 100).toFixed(2)),
        stock: Number(product.stock || 0),
        image: product.image_url || '',
        prep: product.description || '即取'
      };
    }

    function mapStallItem(item, index, allItems) {
      const shop = item.shop || {};
      const session = item.stall_session || null;
      const products = (item.products || []).map(mapProduct);
      const projected = projectToStage(session?.lat, session?.lng, index, allItems);
      const walk = item.walk_minutes ? `${item.walk_minutes} 分钟` : '定位后显示';
      const displayStatus = item.display_status || 'active';
      const online = displayStatus === 'active';
      const lastOnlineAt = item.last_online_at || session?.ended_at || session?.updated_at || session?.started_at || shop.updated_at || '';
      return {
        id: shop.shop_code || `shop-${shop.id || index}`,
        shopId: shop.id || '',
        merchantId: shop.merchant_id || '',
        shopCode: shop.shop_code || '',
        name: shop.name || '流动摊位',
        category: normalizeCategory(shop.category),
        status: online ? '营业中' : '最近在线',
        tone: online ? 'open' : 'warn',
        online,
        lastOnlineAt,
        lastOnlineLabel: formatShortDateTime(lastOnlineAt),
        area: session?.address || shop.announcement || shop.category || '摊主当前位置',
        address: session?.address || shop.announcement || '摊主暂未公开实时位置',
        end: session?.expected_end_at ? formatClock(session.expected_end_at) : '—',
        accuracy: item.location_accuracy ? `${item.location_accuracy} 米` : '约 30 米',
        distance: metersText(item.distance_meters),
        walk,
        x: projected.x,
        y: projected.y,
        lat: session?.lat,
        lng: session?.lng,
        popular: products.slice(0, 2).map((product) => product.name).join(' / ') || shop.announcement || '今日菜单待更新',
        prep: products[0]?.prep || '到摊即取',
        products,
        todayPhotos: products.filter((product) => product.image).slice(0, 4).map((product) => ({ label: product.name, note: '摊主商品图 · 可预定', src: product.image }))
      };
    }

    function mapFocusedPayload(payload) {
      return mapStallItem({
        shop: payload.shop,
        stall_session: payload.stall_session,
        products: payload.products || [],
        distance_meters: payload.distance_meters,
        walk_minutes: payload.walk_minutes,
        display_status: payload.display_status,
        last_online_at: payload.last_online_at,
        location_accuracy: payload.stall_session?.location_accuracy || 0
      }, 0, [{ stall_session: payload.stall_session }]);
    }

    function replaceVendors(nextVendors) {
      vendors.splice(0, vendors.length, ...sortVendors(nextVendors));
      if (state.focusedShopCode && vendors.length) {
        state.selectedId = vendors[0].id;
        state.detailOpen = true;
        applyShareAutoFavorite();
      } else if (!findVendor(state.selectedId) && vendors.length) {
        state.selectedId = vendors[0].id;
      }
    }

    function vendorMatchesShare(vendor) {
      if (!vendor) return false;
      if (state.focusedShopCode && vendor.shopCode && vendor.shopCode !== state.focusedShopCode) return false;
      if (state.shareFavorite.merchantId && String(vendor.merchantId || '') !== state.shareFavorite.merchantId) return false;
      if (state.shareFavorite.shopId && String(vendor.shopId || '') !== state.shareFavorite.shopId) return false;
      return true;
    }

    function persistFavoriteIds() {
      saveStoredFavoriteIds(state.favoriteIds);
    }

    function applyShareAutoFavorite() {
      if (!state.shareFavorite.pending || !state.focusedShopCode) return;
      const vendor = vendors.find(vendorMatchesShare) || vendors.find((item) => item.shopCode === state.focusedShopCode || item.id === state.focusedShopCode);
      if (!vendor) return;
      state.favoriteIds.add(vendor.id);
      persistFavoriteIds();
      state.shareFavorite.pending = false;
      state.apiNotice = '已自动收藏该摊位，后续可在“收藏”里快速找到。';
    }

    async function loadCustomerMapState() {
      const requestSeq = ++state.mapRequestSeq;
      const locationQuery = currentLocationQuery();
      const stallParams = state.focusedShopCode ? null : buildStallQueryParams(locationQuery);
      const queryKey = stallParams ? stableMapQueryKey(stallParams) : '';
      state.loading = true;
      state.apiError = '';
      renderAll();
      try {
        if (state.focusedShopCode) {
          const data = await apiFetch(`/api/shops/${encodeURIComponent(state.focusedShopCode)}/map-state${buildQuery(locationQuery)}`);
          if (requestSeq !== state.mapRequestSeq) return;
          replaceVendors(data.shop ? [mapFocusedPayload(data)] : []);
          state.apiNotice = data.notice || '单摊导航模式只显示该摊主当前位置。';
          state.lastMapQueryKey = '';
        } else {
          const data = await apiFetch(`/api/stalls/nearby${buildQuery(stallParams)}`);
          if (requestSeq !== state.mapRequestSeq) return;
          replaceVendors((data.stalls || []).map(mapStallItem));
          state.apiNotice = data.notice || '位置由摊主主动更新，距离仅供参考。';
          state.loadedSearchScope = searchScope();
          state.lastMapQueryKey = queryKey;
        }
        state.apiReady = true;
      } catch (error) {
        if (requestSeq !== state.mapRequestSeq) return;
        state.apiError = error.message || '地图数据加载失败';
      } finally {
        if (requestSeq === state.mapRequestSeq) {
          state.loading = false;
          renderAll();
        }
      }
    }

    function scheduleSearchScopeReload() {
      scheduleMapViewportReload('filter');
    }

    function scheduleMapViewportReload(reason = 'viewport') {
      if (!state.apiReady || state.focusedShopCode || state.loading) return;
      const nextKey = stableMapQueryKey(buildStallQueryParams());
      if (state.lastMapQueryKey === nextKey) return;
      const delay = reason === 'viewport' ? 360 : 180;
      window.clearTimeout(mapReloadTimer);
      mapReloadTimer = window.setTimeout(() => {
        if (state.lastMapQueryKey !== stableMapQueryKey(buildStallQueryParams())) loadCustomerMapState();
      }, delay);
    }

    function mapOrder(order) {
      const locationSnapshot = typeof order.location_snapshot === 'string'
        ? (() => {
          try { return JSON.parse(order.location_snapshot || '{}'); } catch (error) { return {}; }
        })()
        : (order.location_snapshot || {});
      const shopCode = order.shop?.shop_code || '';
      const vendor = vendors.find((item) => item.shopCode === order.shop?.shop_code || item.id === order.shop?.shop_code) || getSelectedVendor();
      const firstItem = (order.items || [])[0] || {};
      return {
        id: order.order_no,
        backendOrderNo: order.order_no,
        vendorId: vendor?.id || shopCode || state.selectedId,
        shopCode,
        vendorName: vendor?.name || order.shop?.name || '流动摊位',
        vendorCategory: vendor?.category || normalizeCategory(order.shop?.category),
        vendorArea: vendor?.area || locationSnapshot.address || order.shop?.announcement || '摊主当前位置',
        productName: firstItem.product_name || (order.items || []).map((item) => item.product_name).join(' / ') || '预购商品',
        quantity: (order.items || []).reduce((sum, item) => sum + Number(item.quantity || 0), 0) || 1,
        pickup: order.pickup_time ? formatClock(order.pickup_time) : '尽快到摊取',
        contactName: order.customer_name,
        contactPhone: order.customer_phone,
        note: order.remark || '',
        total: Number(((order.total_amount_cents || 0) / 100).toFixed(2)),
        code: order.pickup_code || '—',
        status: order.status || 'pending_accept',
        createdAt: order.created_at || new Date().toISOString()
      };
    }

    function orderTimeValue(order) {
      const time = new Date(order.createdAt || 0).getTime();
      return Number.isFinite(time) ? time : 0;
    }

    function persistCustomerOrders() {
      try {
        localStorage.setItem(CUSTOMER_ORDERS_STORAGE_KEY, JSON.stringify(state.orders.slice(0, 100)));
      } catch (error) {
        // Some embedded browsers may block storage; keep the current session state.
      }
    }

    function mergeCustomerOrders(nextOrders, shouldRender = true) {
      const byId = new Map();
      [...state.orders, ...nextOrders].forEach((order) => {
        if (!order?.id) return;
        byId.set(order.id, { ...(byId.get(order.id) || {}), ...order });
      });
      const merged = Array.from(byId.values()).sort((a, b) => orderTimeValue(b) - orderTimeValue(a));
      state.orders.splice(0, state.orders.length, ...merged);
      persistCustomerOrders();
      if (shouldRender) renderAll();
    }

    async function loadCustomerOrders() {
      if (!CUSTOMER_TOKEN) return;
      try {
        const data = await apiFetch('/api/customer/orders');
        mergeCustomerOrders((data.orders || []).map(mapOrder));
      } catch (error) {
        console.warn('customer orders sync failed', error);
      }
    }

    function pickupTimeFromLabel(label) {
      if (!label || label.includes('尽快')) return null;
      const minutes = label.includes('30') ? 30 : 15;
      return new Date(Date.now() + minutes * 60 * 1000).toISOString();
    }

    async function cancelCustomerOrder(orderId) {
      const order = state.orders.find((item) => item.id === orderId);
      if (!order) return;
      if (!order.backendOrderNo) {
        order.status = 'canceled';
        persistCustomerOrders();
        renderAll();
        return;
      }
      try {
        await apiFetch(`/api/orders/${encodeURIComponent(order.backendOrderNo)}/cancel`, { method: 'POST', body: JSON.stringify({}) });
        order.status = 'canceled';
        persistCustomerOrders();
        await loadCustomerOrders();
        await loadCustomerMapState();
      } catch (error) {
        state.apiError = error.message || '取消预定失败';
        renderAll();
      }
    }

    function completeLocalOrder(orderId) {
      const order = state.orders.find((item) => item.id === orderId);
      if (order) order.status = 'completed';
      persistCustomerOrders();
      renderAll();
    }

    function loadTencentMapSdk() {
      if (!TENCENT_MAP_KEY) return Promise.reject(new Error('missing tencent key'));
      if (window.TMap) return Promise.resolve(window.TMap);
      if (tencentMapPromise) return tencentMapPromise;
      tencentMapPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.charset = 'utf-8';
        script.async = true;
        script.src = `https://map.qq.com/api/gljs?v=1.exp&key=${encodeURIComponent(TENCENT_MAP_KEY)}`;
        script.onload = () => window.TMap ? resolve(window.TMap) : reject(new Error('腾讯地图 SDK 未就绪'));
        script.onerror = () => reject(new Error('腾讯地图 SDK 加载失败'));
        document.head.appendChild(script);
      });
      return tencentMapPromise;
    }

    function isWeChatBrowser() {
      return /MicroMessenger/i.test(navigator.userAgent || '');
    }

    function loadWeChatSdk() {
      if (window.wx) return Promise.resolve(window.wx);
      if (weChatSdkPromise) return weChatSdkPromise;
      weChatSdkPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.charset = 'utf-8';
        script.async = true;
        script.src = WECHAT_JS_SDK_URL;
        script.onload = () => window.wx ? resolve(window.wx) : reject(new Error('微信 JS-SDK 未就绪'));
        script.onerror = () => reject(new Error('微信 JS-SDK 加载失败'));
        document.head.appendChild(script);
      });
      return weChatSdkPromise;
    }

    async function ensureWeChatLocationReady() {
      if (!isWeChatBrowser()) throw new Error('当前不是微信环境');
      const pageURL = window.location.href.split('#')[0];
      if (weChatConfiguredURL === pageURL && window.wx) return window.wx;
      const cfg = await apiFetch(`/api/wechat/js-config?url=${encodeURIComponent(pageURL)}`);
      if (!cfg.enabled) throw new Error(cfg.reason || '微信定位配置未启用');
      const wx = await loadWeChatSdk();
      await new Promise((resolve, reject) => {
        wx.config({
          debug: false,
          appId: cfg.app_id,
          timestamp: Number(cfg.timestamp),
          nonceStr: cfg.nonce_str,
          signature: cfg.signature,
          jsApiList: cfg.js_api_list || ['getLocation']
        });
        wx.ready(resolve);
        wx.error((error) => reject(new Error(error?.errMsg || '微信定位配置失败')));
      });
      weChatConfiguredURL = pageURL;
      return wx;
    }

    async function getWeChatLocation() {
      const wx = await ensureWeChatLocationReady();
      return new Promise((resolve, reject) => {
        wx.getLocation({
          type: 'gcj02',
          success: (res) => resolve({
            lat: Number(res.latitude),
            lng: Number(res.longitude),
            accuracy: Math.round(Number(res.accuracy || 0)),
            source: 'wechat'
          }),
          fail: (error) => reject(new Error(error?.errMsg || '微信定位授权失败'))
        });
      });
    }

    function browserLocationBlockedReason() {
      if (window.isSecureContext) return '';
      const host = window.location.hostname;
      if (host === 'localhost' || host === '127.0.0.1' || host === '::1') return '';
      return '当前是 HTTP 内网地址，浏览器会禁止定位；请用 HTTPS 正式域名、微信 JS-SDK 授权域名，或在本机 localhost 调试。';
    }

    function getBrowserLocation() {
      return new Promise((resolve, reject) => {
        const blocked = browserLocationBlockedReason();
        if (blocked) {
          reject(new Error(blocked));
          return;
        }
        if (!navigator.geolocation) {
          reject(new Error('当前浏览器不支持定位'));
          return;
        }
        navigator.geolocation.getCurrentPosition((position) => {
          resolve({
            lat: position.coords.latitude,
            lng: position.coords.longitude,
            accuracy: Math.round(position.coords.accuracy || 0),
            source: 'browser'
          });
        }, () => reject(new Error('定位授权失败，仍可浏览摊位')), { enableHighAccuracy: true, timeout: 5000, maximumAge: 60000 });
      });
    }

    async function requestCustomerLocation() {
      if (state.locating) return;
      state.locating = true;
      state.loading = true;
      state.locationNotice = isWeChatBrowser() ? '正在通过微信定位…' : '正在请求浏览器定位…';
      renderAll();
      try {
        const location = isWeChatBrowser() ? await getWeChatLocation() : await getBrowserLocation();
        state.located = true;
        state.userLocation = { lat: location.lat, lng: location.lng, accuracy: location.accuracy };
        state.centerUserOnNextRender = true;
        state.locationNotice = location.source === 'wechat' ? '已使用微信定位' : '已使用浏览器定位';
        state.locating = false;
        await loadCustomerMapState();
      } catch (error) {
        state.locating = false;
        state.loading = false;
        state.locationNotice = error.message || '定位失败，仍可浏览摊位';
        renderAll();
      }
    }

    function clearTencentMapOverlays(options = {}) {
      if (tencentVendorMarker) {
        tencentVendorMarker.setMap(null);
        tencentVendorMarker = null;
      }
      if (tencentUserMarker) {
        tencentUserMarker.setMap(null);
        tencentUserMarker = null;
      }
      if (options.hideCanvas) {
        mapStage.classList.remove('is-tencent-ready');
        const canvas = document.getElementById('tencentMapCanvas');
        if (canvas) canvas.hidden = true;
      }
    }

    function tencentLatLng(TMap, vendor) {
      return new TMap.LatLng(Number(vendor.lat), Number(vendor.lng));
    }

    function tencentShopMarkerStyles(TMap, rows = []) {
      if (!TMap.MarkerStyle) return {};
      const keys = Array.from(new Set((rows.length ? rows : vendors).map((vendor) => categoryKey(vendor.category))));
      return keys.reduce((styles, key) => {
        styles[tencentShopStyleId(key)] = new TMap.MarkerStyle({
          width: 44,
          height: 52,
          anchor: { x: 22, y: 50 },
          src: tencentShopMarkerSrc(key),
          direction: 'bottom',
          offset: { x: 0, y: 8 },
          color: '#26180F',
          size: 13,
          strokeColor: 'rgba(255, 255, 255, .95)',
          strokeWidth: 2,
          padding: '5px 10px',
          backgroundColor: 'rgba(255, 251, 236, .96)',
          backgroundBorderColor: 'rgba(55, 41, 20, .22)',
          backgroundBorderWidth: 1,
          backgroundBorderRadius: 999,
          wrapOptions: { maxWidth: 118, maxLineCount: 1 }
        });
        return styles;
      }, {});
    }

    function tencentUserMarkerStyles(TMap) {
      if (!TMap.MarkerStyle) return {};
      return {
        user: new TMap.MarkerStyle({
          width: 36,
          height: 36,
          anchor: { x: 18, y: 18 },
          src: TENCENT_USER_MARKER_SRC
        })
      };
    }

    function pointCoord(point, coord) {
      if (!point) return NaN;
      const method = coord === 'lat' ? 'getLat' : 'getLng';
      if (typeof point[method] === 'function') return Number(point[method]());
      if (typeof point[coord] === 'function') return Number(point[coord]());
      return Number(point[coord]);
    }

    function boundsPoint(bounds, method, ...keys) {
      if (!bounds) return null;
      if (typeof bounds[method] === 'function') return bounds[method]();
      for (const key of keys) {
        if (bounds[key]) return bounds[key];
      }
      return null;
    }

    function readTencentMapBounds() {
      if (!tencentMap || typeof tencentMap.getBounds !== 'function') return null;
      const bounds = tencentMap.getBounds();
      const sw = boundsPoint(bounds, 'getSouthWest', 'southWest', 'sw', '_sw');
      const ne = boundsPoint(bounds, 'getNorthEast', 'northEast', 'ne', '_ne');
      const swLat = pointCoord(sw, 'lat');
      const swLng = pointCoord(sw, 'lng');
      const neLat = pointCoord(ne, 'lat');
      const neLng = pointCoord(ne, 'lng');
      if (![swLat, swLng, neLat, neLng].every(Number.isFinite)) return null;
      return {
        minLat: Math.min(swLat, neLat),
        maxLat: Math.max(swLat, neLat),
        minLng: Math.min(swLng, neLng),
        maxLng: Math.max(swLng, neLng)
      };
    }

    function updateTencentViewportState() {
      const bounds = readTencentMapBounds();
      if (bounds) state.mapBounds = bounds;
      if (tencentMap && typeof tencentMap.getZoom === 'function') {
        const zoom = Number(tencentMap.getZoom());
        if (Number.isFinite(zoom)) state.mapZoom = zoom;
      }
      return Boolean(bounds);
    }

    function handleTencentViewportChanged() {
      if (!updateTencentViewportState()) return;
      scheduleMapViewportReload('viewport');
    }

    function bindTencentMapEvents() {
      if (tencentMapEventsBound || !tencentMap || typeof tencentMap.on !== 'function') return;
      tencentMapEventsBound = true;
      tencentMap.on('click', () => {
        if (suppressNextMapClose || !state.detailOpen) return;
        closeDetail();
      });
      ['dragend', 'zoomend', 'zoom_changed', 'bounds_changed', 'idle'].forEach((eventName) => {
        tencentMap.on(eventName, handleTencentViewportChanged);
      });
    }

    async function renderTencentMap(filtered) {
      if (!TENCENT_MAP_KEY) {
        clearTencentMapOverlays({ hideCanvas: true });
        return;
      }
      const withLocation = filtered.filter((vendor) => Number.isFinite(Number(vendor.lat)) && Number.isFinite(Number(vendor.lng)));
      try {
        const TMap = await loadTencentMapSdk();
        const canvas = document.getElementById('tencentMapCanvas');
        if (!canvas) return;
        canvas.hidden = false;
        mapStage.classList.add('is-tencent-ready');
        const centerVendor = withLocation.find((vendor) => vendor.id === state.selectedId) || withLocation[0];
        const fallbackCenter = state.userLocation || centerVendor || DEFAULT_MAP_CENTER;
        const center = state.userLocation && state.centerUserOnNextRender
          ? new TMap.LatLng(state.userLocation.lat, state.userLocation.lng)
          : centerVendor
            ? new TMap.LatLng(Number(centerVendor.lat), Number(centerVendor.lng))
            : new TMap.LatLng(Number(fallbackCenter.lat), Number(fallbackCenter.lng));
        if (!tencentMap) {
          tencentMap = new TMap.Map(canvas, { center, zoom: state.focusedShopCode ? 18 : 17, viewMode: '2D' });
        } else {
          const shouldCenterSelected = state.centerSelectedOnNextRender && centerVendor && centerVendor.id === state.selectedId;
          if (state.focusedShopCode || state.centerUserOnNextRender || shouldCenterSelected) {
            tencentMap.setCenter(center);
            if (typeof tencentMap.setZoom === 'function' && state.focusedShopCode) tencentMap.setZoom(18);
          }
        }
        state.centerSelectedOnNextRender = false;
        state.centerUserOnNextRender = false;
        bindTencentMapEvents();
        clearTencentMapOverlays();
        if (withLocation.length) {
          tencentVendorMarker = new TMap.MultiMarker({
            map: tencentMap,
            styles: tencentShopMarkerStyles(TMap, withLocation),
            geometries: withLocation.map((vendor, index) => ({
              id: vendor.id,
              styleId: TMap.MarkerStyle ? tencentShopStyleId(vendor.category) : undefined,
              position: tencentLatLng(TMap, vendor),
              content: vendor.name,
              rank: 1000 - index,
              properties: { title: vendor.name, category: vendor.category }
            }))
          });
          tencentVendorMarker.on('click', (event) => {
            const id = event.geometry?.id;
            if (id) selectVendor(id);
          });
        }
        if (state.userLocation) {
          tencentUserMarker = new TMap.MultiMarker({
            map: tencentMap,
            styles: tencentUserMarkerStyles(TMap),
            geometries: [{
              id: 'user',
              styleId: TMap.MarkerStyle ? 'user' : undefined,
              position: new TMap.LatLng(state.userLocation.lat, state.userLocation.lng)
            }]
          });
        }
        if (updateTencentViewportState() && !state.focusedShopCode) scheduleMapViewportReload('viewport');
      } catch (error) {
        clearTencentMapOverlays({ hideCanvas: true });
      }
    }

    window.setCustomerContext = function setCustomerContext(context = {}) {
      const nextShopCode = String(context.shopCode || '').trim();
      const nextMerchantId = String(context.merchantId || '').trim();
      const nextShopId = String(context.shopId || '').trim();
      const nextAutoFavorite = ['1', 'true', 'yes'].includes(String(context.favorite || '').toLowerCase()) || Boolean(nextMerchantId);
      const shareChanged = nextMerchantId !== state.shareFavorite.merchantId || nextShopId !== state.shareFavorite.shopId;
      state.shareFavorite = {
        pending: nextAutoFavorite && (shareChanged || !state.favoriteIds.has(nextShopCode)),
        merchantId: nextMerchantId,
        shopId: nextShopId
      };
      if (nextShopCode !== state.focusedShopCode) {
        state.focusedShopCode = nextShopCode;
        state.selectedId = null;
        state.detailOpen = false;
        loadCustomerMapState();
      } else {
        applyShareAutoFavorite();
        renderAll();
      }
    };

    function categories() {
      return ['全部', ...STALL_CATEGORY_OPTIONS];
    }

    function categoryKey(category) {
      const label = String(category || '').trim();
      if (!label) return 'other';
      if (categoryCatalog[label]) return label;
      if (categoryAliases[label]) return categoryAliases[label];
      const compact = label.replace(/\s+/g, '');
      if (categoryCatalog[compact]) return compact;
      if (categoryAliases[compact]) return categoryAliases[compact];
      const matched = Object.entries(categoryCatalog).find(([, config]) =>
        config.aliases.some((alias) => compact.includes(alias) || alias.includes(compact))
      );
      return matched?.[0] || 'other';
    }

    function categoryFamily(category) {
      const key = categoryKey(category);
      return categoryCatalog[key]?.family || categoryFamilies[category] || 'neutral';
    }

    function stickerIcon(body) {
      return `<svg class="category-sticker" viewBox="0 0 32 32" fill="none" aria-hidden="true"><rect class="sticker-paper" x="3.8" y="3.8" width="24.4" height="24.4" rx="8.2" transform="rotate(-4 16 16)"/><g>${body}</g></svg>`;
    }

    function categoryIcon(category) {
      const config = categoryCatalog[categoryKey(category)] || categoryCatalog.other;
      return stickerIcon(config.body);
    }

    function categoryConfig(category) {
      return categoryCatalog[category] || categoryCatalog[categoryKey(category)] || categoryCatalog.other;
    }

    function tencentShopStyleId(category) {
      return `shop-${categoryKey(category)}`;
    }

    function tencentShopMarkerSrc(category) {
      const config = categoryConfig(category);
      const marker = config.marker || categoryCatalog.other.marker;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
        <svg width="44" height="52" viewBox="0 0 44 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <style>
            .sticker-fill{fill:${marker.pin};fill-opacity:.2;stroke:${marker.ink};stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
            .sticker-line{fill:none;stroke:${marker.ink};stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
          </style>
          <path d="M22 50C22 50 40 33.4 40 19.8C40 9.4 32 2 22 2C12 2 4 9.4 4 19.8C4 33.4 22 50 22 50Z" fill="${marker.pin}" stroke="#FFF8E7" stroke-width="3"/>
          <circle cx="22" cy="20" r="12.5" fill="${marker.paper}"/>
          <svg x="9" y="7" width="26" height="26" viewBox="0 0 32 32">${config.body}</svg>
        </svg>
      `)}`;
    }

    function findVendor(id) {
      return vendors.find(vendor => vendor.id === id) || null;
    }

    function isOpenVendor(vendor) {
      if (!vendor) return false;
      if (vendor.online === true) return true;
      if (vendor.online === false) return false;
      return !['未出摊', '已收摊', '暂停营业', '最近在线'].includes(vendor.status);
    }

    function hasTextSearch() {
      return state.query.trim().length > 0;
    }

    function searchScope() {
      return hasTextSearch() ? 'recent' : 'active';
    }

    function isRecentlyOnline(vendor) {
      if (isOpenVendor(vendor)) return true;
      const timestamp = Date.parse(vendor?.lastOnlineAt || '');
      if (!Number.isFinite(timestamp)) return false;
      return Date.now() - timestamp <= 3 * 24 * 60 * 60 * 1000;
    }

    function vendorDistanceValue(vendor) {
      const raw = String(vendor?.distance || '');
      if (raw.includes('公里')) return Number.parseFloat(raw) * 1000;
      if (raw.includes('米')) return Number.parseFloat(raw);
      return Number.POSITIVE_INFINITY;
    }

    function sortVendors(rows) {
      return [...rows].sort((a, b) => {
        const openDelta = Number(isOpenVendor(b)) - Number(isOpenVendor(a));
        if (openDelta) return openDelta;
        const distanceDelta = vendorDistanceValue(a) - vendorDistanceValue(b);
        if (Number.isFinite(distanceDelta) && distanceDelta !== 0) return distanceDelta;
        return String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN');
      });
    }

    function favoriteVendors() {
      return sortVendors(Array.from(state.favoriteIds).map(findVendor).filter(Boolean));
    }

    function activeFavoriteCount() {
      return favoriteVendors().filter(isOpenVendor).length;
    }

    function openVendorCount(rows) {
      return rows.filter(isOpenVendor).length;
    }

    function selectedCategoryList() {
      return Array.from(state.selectedCategories);
    }

    function hasCategoryFilter() {
      return state.selectedCategories.size > 0;
    }

    function categoryFilterLabel() {
      const selected = selectedCategoryList();
      if (!selected.length) return '全部品类';
      if (selected.length === 1) return `品类筛选：${selected[0]}`;
      return `已选 ${selected.length} 个品类`;
    }

    function filteredVendors() {
      const query = state.query.trim().toLowerCase();
      const includeRecent = Boolean(query);
      return sortVendors(vendors.filter(vendor => {
        const inCategory = !hasCategoryFilter() || state.selectedCategories.has(vendor.category);
        const text = [vendor.name, vendor.category, vendor.area, vendor.address, vendor.popular].join(' ').toLowerCase();
        const inVisibilityScope = includeRecent ? isRecentlyOnline(vendor) : isOpenVendor(vendor);
        return inCategory && inVisibilityScope && (!query || text.includes(query));
      }));
    }

    function getSelectedVendor() {
      return findVendor(state.selectedId) || sortVendors(vendors)[0] || null;
    }

    function statusTone(vendor) {
      return vendor.tone === 'warn' ? 'warn' : 'open';
    }

    function distanceText(vendor) {
      return state.located ? `${vendor.distance} · 步行 ${vendor.walk}` : '定位后显示距离';
    }

    function businessTimeText(vendor) {
      if (isOpenVendor(vendor)) return vendor.end && vendor.end !== '—' ? `营业至 ${vendor.end}` : '营业中';
      return vendor.lastOnlineLabel ? `最近在线 ${vendor.lastOnlineLabel}` : '营业时间待更新';
    }

    function currency(value) {
      return `¥${Number(value).toFixed(0)}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('\"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('`', '&#96;');
    }

    function cssURL(value) {
      return String(value || '').replaceAll('\\', '\\\\').replaceAll('"', '\\"').replaceAll('\n', '');
    }

    function productBackgroundStyle(value) {
      const image = cssURL(value);
      return image ? ` style="--product-bg: url(&quot;${escapeAttr(image)}&quot;);"` : '';
    }

    function activeOrderCount() {
      return state.orders.length;
    }

    function selectedPreorderVendor() {
      return findVendor(state.preorder.vendorId) || getSelectedVendor();
    }

    function preorderProductKey(productOrName) {
      if (typeof productOrName === 'string') return productOrName;
      return String(productOrName?.backendId || productOrName?.id || productOrName?.name || '');
    }

    function preorderQuantity(productOrName) {
      const key = preorderProductKey(productOrName);
      return Math.max(0, Number(state.preorder.quantities?.[key] || 0));
    }

    function selectedPreorderItems() {
      const vendor = selectedPreorderVendor();
      if (!vendor) return [];
      return vendor.products
        .map((product) => ({ product, quantity: preorderQuantity(product) }))
        .filter((item) => item.quantity > 0);
    }

    function applyMerchantSnapshot() {
      let payload = null;
      try {
        payload = JSON.parse(localStorage.getItem('mplzMerchantToday') || 'null');
      } catch (error) {
        payload = null;
      }
      if (!payload || payload.vendorId !== 'baozi') return;
      const vendor = findVendor('baozi');
      if (!vendor) return;
      if (payload.closeTime) vendor.end = payload.closeTime;
      if (payload.location) {
        vendor.area = payload.location.name || vendor.area;
        vendor.address = payload.location.address || vendor.address;
        vendor.accuracy = payload.location.accuracy || vendor.accuracy;
      }
      if (Array.isArray(payload.photos) && payload.photos.length) {
        vendor.todayPhotos = payload.photos.slice(0, 4).map(photo => ({
          label: photo.label || '今日商品照片',
          note: photo.note || '摊主今日拍摄',
          src: photo.src || ''
        }));
      }
      if (Array.isArray(payload.products)) {
        vendor.products = payload.products.map(product => ({
          name: product.name || '今日餐品',
          price: Number(product.price || 0),
          stock: Number(product.stock || 0),
          prep: product.prep || '',
          image: product.image || product.image_url || ''
        }));
        vendor.popular = vendor.products.slice(0, 2).map(product => product.name).join(' / ') || '今日菜单待更新';
        const firstAvailable = vendor.products.find(product => product.stock > 0);
        if (firstAvailable && firstAvailable.prep) vendor.prep = firstAvailable.prep;
      }
      vendor.status = payload.stallOpen === false ? '已收摊' : '营业中';
      vendor.tone = payload.stallOpen === false ? 'warn' : 'open';
      vendor.online = payload.stallOpen !== false;
      vendor.lastOnlineAt = new Date().toISOString();
      vendor.lastOnlineLabel = formatShortDateTime(vendor.lastOnlineAt);
    }

    function orderStatusLabel(status) {
      return {
        reserved: '待到摊取货',
        pending_accept: '待摊主接单',
        accepted: '摊主已接单',
        preparing: '备货中',
        ready: '可取货',
        completed: '已取货',
        cancelled: '已取消',
        canceled: '已取消',
        rejected: '已拒单',
        expired: '已过期'
      }[status] || '待到摊取货';
    }

    function renderTabs() {
      tabButtons.forEach(button => {

      tabCountNodes.forEach(node => {

      mapStage.hidden = state.activeTab !== 'map';

    function renderCategories() {
      categoryChips.innerHTML = categories().map(category => `
        <button class="category-choice" type="button" data-category="${escapeAttr(category)}" aria-pressed="${category === '全部' ? !hasCategoryFilter() : state.selectedCategories.has(category)}" aria-label="${escapeAttr(category === '全部' ? '清除品类筛选' : state.selectedCategories.has(category) ? `取消${category}分类` : `选择${category}分类`)}">
          <span class="category-choice-icon" aria-hidden="true">${category === '全部' ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>' : categoryIcon(category)}</span>
          <span>${escapeHtml(category)}</span>
        </button>
      `).join('');
      const selected = selectedCategoryList();
      const isFiltered = selected.length > 0;
      const label = categoryFilterLabel();
      categoryDrawer.hidden = !state.categoryOpen;
      categoryToggle.setAttribute('aria-expanded', String(state.categoryOpen));
      categoryToggle.classList.toggle('is-filtered', isFiltered);
      categoryLabel.textContent = label;
      categoryToggle.setAttribute('aria-label', isFiltered ? label : '打开品类筛选');
      categoryToggle.title = isFiltered ? label : '品类筛选';
      activeFilterText.hidden = !isFiltered;
      activeFilterText.innerHTML = selected.map(category => `
        <button class="active-filter-chip" type="button" data-remove-category="${escapeAttr(category)}" aria-label="移除${escapeAttr(category)}分类">${escapeHtml(category)}</button>
      `).join('');
    }

    function renderMarkers(filtered) {
      markerLayer.innerHTML = filtered.map(vendor => `
        <button class="marker" data-id="${vendor.id}" data-tone="${statusTone(vendor)}" data-family="${categoryFamily(vendor.category)}" style="left: ${vendor.x}%; top: ${vendor.y}%;" aria-label="${vendor.name}，${vendor.category}，${vendor.status}，点击查看详情" aria-expanded="${vendor.id === state.selectedId && state.detailOpen}" aria-controls="detailCard" title="${vendor.category} · ${vendor.name}">
          <span class="marker-glyph" aria-hidden="true">${categoryIcon(vendor.category)}</span>

    function renderDetail(vendor) {
      const productPreview = vendor.products.slice(0, 3).map(product => `<span><strong>${escapeHtml(product.name)}</strong><em>${currency(product.price)}</em></span>`).join('');
      const productHtml = productPreview || '<span><strong>今日菜单待更新</strong><em>到摊查看</em></span>';

      document.body.classList.toggle('modal-open', state.preorder.open || state.join.open || state.feedback.open);

        feedbackBackdrop.hidden = true;

    function renderAll() {
      if (!state.apiReady) applyMerchantSnapshot();
      const filtered = filteredVendors();
      const selectedVisible = filtered.some(vendor => vendor.id === state.selectedId);
      if (!selectedVisible) {
        state.selectedId = null;
        state.detailOpen = false;
      }
      renderTabs();
      renderCategories();
      renderMarkers(filtered);
      detailCard.hidden = !state.detailOpen || filtered.length === 0 || state.activeTab !== 'map';
      detailCard.classList.toggle('is-open', state.detailOpen && filtered.length > 0 && state.activeTab === 'map');
      if (state.detailOpen && state.selectedId && state.activeTab === 'map') renderDetail(getSelectedVendor());
      renderLocation();
      renderOrders();
      renderFavorites();
      renderPreorder();
      renderJoinApplication();
      renderFeedback();
      mapStage.classList.toggle('has-empty', filtered.length === 0);
      const openCount = openVendorCount(filtered);
      const resultCount = filtered.length;
      summaryCount.textContent = state.loading
        ? (state.locating ? '正在定位…' : '加载摊位中…')
        : state.apiError
          ? `接口异常 · ${openCount} 个营业`
          : state.locationNotice && !state.located
            ? `${openCount} 个营业 · 未定位`
            : hasTextSearch()
              ? `${resultCount} 个近 3 天在线结果 · ${openCount} 个营业`
              : `${openCount} 个营业摊位`;
      summaryCount.title = state.locationNotice || state.apiNotice || state.apiError || '';
      renderTencentMap(filtered);
    }

    function setActiveTab(tab) {
      state.activeTab = tab;
      state.categoryOpen = false;
      if (tab !== 'map') state.detailOpen = false;
      renderAll();
    }

    function selectVendor(id) {
      if (!findVendor(id)) return;
      suppressNextMapClose = true;
      state.activeTab = 'map';
      state.selectedId = id;
      state.detailOpen = true;
      state.centerSelectedOnNextRender = true;
      renderAll();
      window.setTimeout(() => {
        suppressNextMapClose = false;
      }, 120);
    }

    function closeDetail() {
      state.detailOpen = false;
      renderAll();
    }

    function toggleFavorite(id) {
      if (state.favoriteIds.has(id)) {
        state.favoriteIds.delete(id);
      } else {
        state.favoriteIds.add(id);
      }
      persistFavoriteIds();
      renderAll();
    }

    function openPreorder(id) {
      const vendor = findVendor(id);
      if (!vendor) return;
      const firstAvailable = vendor.products.find(product => product.stock > 0);
      state.preorder = {
        open: true,
        vendorId: id,
        quantities: firstAvailable ? { [preorderProductKey(firstAvailable)]: 1 } : {},
        pickup: '尽快到摊取',
        contactName: state.preorder.contactName,
        contactPhone: state.preorder.contactPhone,
        note: '',
        error: firstAvailable ? '' : '这个摊位当前商品都已售罄。'
      };
      renderAll();
    }

    function closePreorder() {
      state.preorder.open = false;
      state.preorder.error = '';
      renderAll();
    }

    function openJoinApplication() {
      const contact = loadStoredContact();
      state.activeTab = 'favorites';
      state.detailOpen = false;
      state.join.open = true;
      state.join.error = '';
      state.join.result = '';
      state.join.contactName = state.join.contactName || state.preorder.contactName || contact.name || '';
      state.join.contactPhone = state.join.contactPhone || state.preorder.contactPhone || contact.phone || '';
      renderAll();
    }

    function closeJoinApplication() {
      state.join.open = false;
      state.join.error = '';
      state.join.submitting = false;
      renderAll();
    }

    function openFeedback() {
      const contact = loadStoredContact();
      state.feedback.open = true;
      state.feedback.error = '';
      state.feedback.result = '';
      state.feedback.contactName = state.feedback.contactName || state.preorder.contactName || contact.name || '';
      state.feedback.contactPhone = state.feedback.contactPhone || state.preorder.contactPhone || contact.phone || '';
      renderAll();
    }

    function closeFeedback() {
      state.feedback.open = false;
      state.feedback.error = '';
      state.feedback.submitting = false;
      renderAll();
    }

    async function submitFeedback() {
      const description = state.feedback.description.trim();
      const contactName = state.feedback.contactName.trim();
      const contactPhone = state.feedback.contactPhone.trim();
      if (!description || !contactPhone) {
        state.feedback.error = '请填写反馈描述和联系方式。';
        renderAll();
        return;
      }
      state.feedback.submitting = true;
      state.feedback.error = '';
      state.feedback.result = '';
      renderAll();
      try {
        await apiFetch('/api/feedback', {
          method: 'POST',
          body: JSON.stringify({
            source: 'customer',
            contact_name: contactName,
            contact_phone: contactPhone,
            description,
            image_url: state.feedback.image?.src || '',
            page_url: window.location.pathname + window.location.search
          })
        });
        saveStoredContact(contactName, contactPhone);
        state.feedback.submitting = false;
        state.feedback.result = '反馈已提交，平台会尽快处理。';
        state.feedback.description = '';
        state.feedback.image = null;
        renderAll();
      } catch (error) {
        state.feedback.submitting = false;
        state.feedback.error = error.message || '反馈提交失败，请稍后重试。';
        renderAll();
      }
    }

    async function submitJoinApplication() {
      const shopName = state.join.shopName.trim();
      const contactName = state.join.contactName.trim();
      const contactPhone = state.join.contactPhone.trim();
      if (!shopName || !contactName || !contactPhone || !state.join.category) {
        state.join.error = '请填写店铺名、联系人、联系方式和摊位类型。';
        renderAll();
        return;
      }
      if (!state.join.photo?.src) {
        state.join.error = '请上传至少 1 张流动摊照片。';
        renderAll();
        return;
      }
      state.join.submitting = true;
      state.join.error = '';
      state.join.result = '';
      renderAll();
      try {
        const resp = await apiFetch('/api/merchant-applications', {
          method: 'POST',
          body: JSON.stringify({
            shop_name: shopName,
            contact_name: contactName,
            contact_phone: contactPhone,
            category: state.join.category,
            photo_url: state.join.photo.src,
            usual_area: state.join.usualArea.trim(),
            remark: state.join.remark.trim()
          })
        });
        saveStoredContact(contactName, contactPhone);
        state.preorder.contactName = contactName;
        state.preorder.contactPhone = contactPhone;
        state.join.submitting = false;
        state.join.result = `申请已提交，编号 #${resp.application?.id || '待生成'}。平台会尽快联系你确认。`;
        renderAll();
      } catch (error) {
        state.join.submitting = false;
        state.join.error = error.message || '申请提交失败，请稍后重试。';
        renderAll();
      }
    }

    async function submitPreorder() {
      const vendor = selectedPreorderVendor();
      const selectedItems = selectedPreorderItems();
      const name = state.preorder.contactName.trim();
      const phone = state.preorder.contactPhone.trim();
      if (!vendor || selectedItems.length === 0) {
        state.preorder.error = '请至少选择 1 份商品。';
        renderAll();
        return;
      }
      const missingBackend = selectedItems.find((item) => !item.product.backendId);
      if (missingBackend) {
        state.preorder.error = `${missingBackend.product.name} 还没有接入后端商品 ID，暂不可预定。`;
        renderAll();
        return;
      }
      if (!name || !phone) {
        state.preorder.error = '请填写取货人和联系方式，方便摊主确认。';
        renderAll();
        return;
      }
      const overStock = selectedItems.find((item) => item.product.stock < item.quantity);
      if (overStock) {
        state.preorder.error = `${overStock.product.name} 库存只剩 ${overStock.product.stock} 份，请调整数量。`;
        renderAll();
        return;
      }
      try {
        saveStoredContact(name, phone);
        const resp = await apiFetch('/api/orders', {
          method: 'POST',
          body: JSON.stringify({
            shop_code: vendor.shopCode || vendor.id,
            customer_name: name,
            customer_phone: phone,
            pickup_time: pickupTimeFromLabel(state.preorder.pickup),
            remark: state.preorder.note.trim(),
            items: selectedItems.map((item) => ({ product_id: item.product.backendId, quantity: item.quantity }))
          })
        });
        mergeCustomerOrders([mapOrder(resp.order)], false);
        state.preorder.open = false;
        state.preorder.error = '';
        state.activeTab = 'orders';
        state.detailOpen = false;
        await loadCustomerMapState();
        loadCustomerOrders();
      } catch (error) {
        state.preorder.error = error.message || '预定失败，请稍后重试。';
        renderAll();
      }
    }

    function updateProductQuantity(productKey, delta) {
      const vendor = selectedPreorderVendor();
      const product = vendor?.products?.find((item) => preorderProductKey(item) === productKey);
      if (!product || product.stock <= 0) return;
      const max = Math.max(product.stock, 0);
      const next = Math.min(max, Math.max(0, preorderQuantity(product) + delta));
      state.preorder.quantities = { ...(state.preorder.quantities || {}) };
      if (next > 0) {
        state.preorder.quantities[preorderProductKey(product)] = next;
      } else {
        delete state.preorder.quantities[preorderProductKey(product)];
      }
      state.preorder.error = '';
      renderAll();
    }

    searchInput.addEventListener('input', event => {
      state.query = event.target.value;
      renderAll();
      scheduleSearchScopeReload();
    });

    categoryToggle.addEventListener('click', () => {
      state.categoryOpen = !state.categoryOpen;
      renderAll();
    });

    categoryChips.addEventListener('click', event => {
      const button = event.target.closest('[data-category]');
      if (!button) return;
      const category = button.dataset.category;
      if (category === '全部') {
        state.selectedCategories.clear();
      } else if (state.selectedCategories.has(category)) {
        state.selectedCategories.delete(category);
      } else {
        state.selectedCategories.add(category);
      }
      state.detailOpen = false;
      state.selectedId = null;
      state.categoryOpen = false;
      renderAll();
      scheduleMapViewportReload('filter');
    });

    activeFilterText.addEventListener('click', event => {
      const button = event.target.closest('[data-remove-category]');
      if (!button) return;
      state.selectedCategories.delete(button.dataset.removeCategory);
      state.detailOpen = false;
      state.selectedId = null;
      renderAll();
      scheduleMapViewportReload('filter');
    });

    markerLayer.addEventListener('click', event => {
      const button = event.target.closest('[data-id]');
      if (!button) return;
      event.stopPropagation();
      selectVendor(button.dataset.id);
    });

    mapStage.addEventListener('click', event => {
      if (!state.detailOpen || suppressNextMapClose) return;
      if (event.target.closest('.detail-card, .map-overlay, .map-icon-button, .marker, .category-drawer, .category-toggle')) return;
      closeDetail();
    });

    locateButton.addEventListener('click', () => {
      if (state.located) {
        state.located = false;
        state.userLocation = null;
        state.locationNotice = '';
        loadCustomerMapState();
        return;
      }
      requestCustomerLocation();
    });

    preorderBackdrop.addEventListener('input', event => {
      if (event.target.matches('[data-preorder-name]')) state.preorder.contactName = event.target.value;
      if (event.target.matches('[data-preorder-phone]')) state.preorder.contactPhone = event.target.value;
      if (event.target.matches('[data-preorder-note]')) state.preorder.note = event.target.value;
      state.preorder.error = '';
      const alert = preorderBackdrop.querySelector('.order-result.is-error');
      if (alert) alert.remove();
    });

    preorderBackdrop.addEventListener('change', event => {
      if (event.target.matches('[data-preorder-pickup]')) state.preorder.pickup = event.target.value;
    });

    joinBackdrop.addEventListener('input', event => {
      const field = event.target.closest('[data-join-field]');
      if (!field) return;
      state.join[field.dataset.joinField] = field.value;
      state.join.error = '';
      state.join.result = '';
      const alert = joinBackdrop.querySelector('.order-result.is-error');
      if (alert) alert.remove();
    });

    joinBackdrop.addEventListener('change', event => {
      const field = event.target.closest('[data-join-field]');
      if (field) {
        state.join[field.dataset.joinField] = field.value;
        state.join.error = '';
        state.join.result = '';
        return;
      }
      const photoInput = event.target.closest('[data-join-photo]');
      if (!photoInput) return;
      const file = Array.from(photoInput.files || []).find(item => item.type.startsWith('image/'));
      if (!file) {
        state.join.photo = null;
        state.join.error = '请上传一张流动摊照片。';
        renderAll();
        return;
      }
      const reader = new FileReader();
      reader.addEventListener('load', () => {
        state.join.photo = { label: file.name || '流动摊照片', src: String(reader.result || '') };
        state.join.error = '';
        state.join.result = '';
        renderAll();
      });
      reader.readAsDataURL(file);
    });

    feedbackBackdrop.addEventListener('input', event => {
      const field = event.target.closest('[data-feedback-field]');
      if (!field) return;
      state.feedback[field.dataset.feedbackField] = field.value;
      state.feedback.error = '';
      state.feedback.result = '';
      const alert = feedbackBackdrop.querySelector('.order-result.is-error');
      if (alert) alert.remove();
    });

    feedbackBackdrop.addEventListener('change', event => {
      const field = event.target.closest('[data-feedback-field]');
      if (field) {
        state.feedback[field.dataset.feedbackField] = field.value;
        state.feedback.error = '';
        state.feedback.result = '';
        return;
      }
      const imageInput = event.target.closest('[data-feedback-image]');
      if (!imageInput) return;
      const file = Array.from(imageInput.files || []).find(item => item.type.startsWith('image/'));
      if (!file) {
        state.feedback.image = null;
        renderAll();
        return;
      }
      const reader = new FileReader();
      reader.addEventListener('load', () => {
        state.feedback.image = { label: file.name || '反馈图片', src: String(reader.result || '') };
        state.feedback.error = '';
        state.feedback.result = '';
        renderAll();
      });
      reader.readAsDataURL(file);
    });

    document.addEventListener('click', event => {
      const tabButton = event.target.closest('[data-tab-button]');
      if (tabButton) {
        setActiveTab(tabButton.dataset.tabButton);
        return;
      }
      const closeDetailButton = event.target.closest('[data-close-detail]');
      if (closeDetailButton) {
        closeDetail();
        return;
      }
      const favoriteButton = event.target.closest('[data-toggle-favorite]');
      if (favoriteButton) {
        toggleFavorite(favoriteButton.dataset.toggleFavorite);
        return;
      }
      const removeFavoriteButton = event.target.closest('[data-remove-favorite]');
      if (removeFavoriteButton) {
        state.favoriteIds.delete(removeFavoriteButton.dataset.removeFavorite);
        persistFavoriteIds();
        renderAll();
        return;
      }
      const preorderButton = event.target.closest('[data-open-preorder]');
      if (preorderButton) {
        openPreorder(preorderButton.dataset.openPreorder);
        return;
      }
      const closePreorderButton = event.target.closest('[data-close-preorder]');
      if (closePreorderButton) {
        closePreorder();
        return;
      }
      if (event.target.closest('[data-open-join]')) {
        openJoinApplication();
        return;
      }
      if (event.target.closest('[data-close-join]')) {
        closeJoinApplication();
        return;
      }
      if (event.target.closest('[data-submit-join]')) {
        submitJoinApplication();
        return;
      }
      if (event.target.closest('[data-open-feedback]')) {
        openFeedback();
        return;
      }
      if (event.target.closest('[data-close-feedback]')) {
        closeFeedback();
        return;
      }
      if (event.target.closest('[data-submit-feedback]')) {
        submitFeedback();
        return;
      }
      const quantityButton = event.target.closest('[data-product-qty-step]');
      if (quantityButton) {
        updateProductQuantity(quantityButton.dataset.productName, Number(quantityButton.dataset.productQtyStep));
        return;
      }
      const productCard = event.target.closest('.product-select[data-product-name]');
      if (productCard && !event.target.closest('.quantity-stepper')) {
        updateProductQuantity(productCard.dataset.productName, preorderQuantity(productCard.dataset.productName) > 0 ? 0 : 1);
        return;
      }
      const submitButton = event.target.closest('[data-submit-preorder]');
      if (submitButton) {
        submitPreorder();
        return;
      }
      const viewVendorButton = event.target.closest('[data-view-vendor]');
      if (viewVendorButton) {
        selectVendor(viewVendorButton.dataset.viewVendor);
        return;
      }
      const cancelOrderButton = event.target.closest('[data-order-cancel]');
      if (cancelOrderButton) {
        cancelCustomerOrder(cancelOrderButton.dataset.orderCancel);
        return;
      }
      const pickupOrderButton = event.target.closest('[data-order-pickup]');
      if (pickupOrderButton) {
        completeLocalOrder(pickupOrderButton.dataset.orderPickup);
        return;
      }
      const reorderButton = event.target.closest('[data-order-reorder]');
      if (reorderButton) {
        openPreorder(reorderButton.dataset.orderReorder);
      }
    });

    window.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        if (state.preorder.open) {
          closePreorder();
          return;
        }
        if (state.join.open) {
          closeJoinApplication();
          return;
        }
        if (state.feedback.open) {
          closeFeedback();
          return;
        }
        state.categoryOpen = false;
        closeDetail();
      }
    });

    window.addEventListener('storage', event => {
      if (event.key === 'mplzMerchantToday' && !state.apiReady) renderAll();
    });

    renderAll();
    loadCustomerMapState().finally(loadCustomerOrders);
  </script>




</body></html>
